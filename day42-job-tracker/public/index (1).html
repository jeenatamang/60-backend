<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">💼</span>
      <span class="brand-name">JobTrack</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="applications">Applications</button>
      <button class="nav-btn" data-view="add">Add New</button>
    </nav>
    <div class="sidebar-filters" id="filters">
      <p class="filter-label">Filter by status</p>
      <button class="filter-btn active" data-status="">All</button>
      <button class="filter-btn" data-status="applied">Applied</button>
      <button class="filter-btn" data-status="screening">Screening</button>
      <button class="filter-btn" data-status="interview">Interview</button>
      <button class="filter-btn" data-status="offer">Offer</button>
      <button class="filter-btn" data-status="rejected">Rejected</button>
      <button class="filter-btn" data-status="withdrawn">Withdrawn</button>
    </div>
  </aside>

  <main class="main">

    <!-- Dashboard View -->
    <div class="view active" id="view-dashboard">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p class="page-sub">Your job search at a glance</p>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card loading">Loading...</div>
      </div>
      <div class="section-header">
        <h2>Recent Applications</h2>
      </div>
      <div id="recent-list"></div>
    </div>

    <!-- Applications View -->
    <div class="view" id="view-applications">
      <div class="page-header">
        <h1>Applications</h1>
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Search company or role...">
        </div>
      </div>
      <div id="jobs-list"></div>
    </div>

    <!-- Add New View -->
    <div class="view" id="view-add">
      <div class="page-header">
        <h1>Add Application</h1>
        <p class="page-sub">Track a new job you've applied to</p>
      </div>
      <div class="form-card">
        <div class="form-grid">
          <div class="form-group">
            <label>Company *</label>
            <input type="text" id="f-company" placeholder="e.g. Google">
          </div>
          <div class="form-group">
            <label>Role *</label>
            <input type="text" id="f-role" placeholder="e.g. Backend Engineer">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="f-location" placeholder="e.g. Remote">
          </div>
          <div class="form-group">
            <label>Job Type</label>
            <select id="f-jobType">
              <option value="full-time">Full-time</option>
              <option value="part-time">Part-time</option>
              <option value="internship">Internship</option>
              <option value="contract">Contract</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="f-priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Job URL</label>
            <input type="text" id="f-jobUrl" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Min Salary</label>
            <input type="number" id="f-salaryMin" placeholder="e.g. 80000">
          </div>
          <div class="form-group">
            <label>Max Salary</label>
            <input type="number" id="f-salaryMax" placeholder="e.g. 120000">
          </div>
          <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="f-notes" placeholder="Any notes about this application..." rows="3"></textarea>
          </div>
        </div>
        <button class="btn-primary" id="submit-job">Add Application</button>
      </div>
    </div>

  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
